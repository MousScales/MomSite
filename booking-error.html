<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Error - Maya African Hair Braiding</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="booking.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .error-container { max-width: 600px; margin: 100px auto; padding: 40px; text-align: center; background: #fff; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .error-icon { width: 80px; height: 80px; margin: 0 auto 20px; background: #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 40px; }
        .error-title { font-size: 1.8rem; color: #333; margin-bottom: 15px; }
        .error-message { font-size: 1.1rem; color: #666; margin-bottom: 30px; }
        .btn { padding: 12px 24px; border-radius: 5px; font-size: 1rem; text-decoration: none; display: inline-block; }
        .btn-primary { background: var(--color-accent, #c8914e); color: white; }
    </style>
</head>
<body>
    <nav class="navbar scrolled" id="navbar">
        <a href="index.html" class="logo">Maya African Hair Braiding</a>
        <div class="nav-links" id="nav-links">
            <a href="index.html">Home</a>
            <a href="styles-catalog.html">Our Styles</a>
            <a href="booking.html" class="cta-nav">Book Now</a>
        </div>
    </nav>
    <main class="error-container">
        <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <h1 class="error-title">Something went wrong</h1>
        <p class="error-message" id="error-message">Your payment could not be completed. Please try again.</p>
        <a href="booking.html" class="btn btn-primary">Try Again</a>
    </main>
    <script>
        const params = new URLSearchParams(window.location.search);
        const err = params.get('error');
        if (err) document.getElementById('error-message').textContent = decodeURIComponent(err);
    </script>
</body>
</html>
